<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>展示会フロア管理（共同編集版）</title>
<style>
body { font-family: Arial, sans-serif; }
#floor { position:relative; width:1000px; margin-bottom:20px; }
.point {
  position:absolute;
  cursor:pointer;
  background:transparent;
  border-radius:50%;
  transition: background 0.3s;
  z-index:10; /* 画像より上に表示 */
}
.point.filled { background:rgba(0,128,255,0.5); }
#popup {
  display:none;
  position:fixed;
  top:30%;
  left:40%;
  background:#fff;
  padding:20px;
  border:2px solid #333;
  z-index:1000;
}
table { border-collapse: collapse; width: 50%; margin-top: 20px; }
table, th, td { border: 1px solid #333; padding: 5px; text-align: center; }
</style>
</head>
<body>

<h2>展示会フロア管理（共同編集版）</h2>

<div id="floor">
  <img src="floor.png" width="1000" id="floor-img">
</div>

<div id="popup">
  <h3 id="booth"></h3>
  <input id="name" placeholder="担当者名">
  <button onclick="save()">保存</button>
</div>

<h3>登録済み一覧</h3>
<table id="list">
  <tr><th>小間番号</th><th>担当者</th></tr>
</table>

<script>
const SHEET_URL = "https://script.google.com/macros/s/YOUR_DEPLOY_URL/exec"; // ←ここにデプロイURL

const positions = {
  "722": {x:285, y:184},
  "721": {x:285, y:210},
  "720": {x:286, y:233},
  "719": {x:288, y:257},
  "718": {x:287, y:279}
  // 必要に応じて追加
};

const floorDiv = document.getElementById("floor");
let currentBooth = "";
let dataList = {};

// クリック範囲生成
const size = 20; // 少し大きめにすると押しやすい
for(const b in positions){
  const p = positions[b];
  const div = document.createElement("div");
  div.className = "point";
  div.style.width = size+"px";
  div.style.height = size+"px";
  div.style.left = (p.x - size/2) + "px";
  div.style.top = (p.y - size/2) + "px";
  div.dataset.booth = b;
  div.onclick = () => openPopup(b);
  floorDiv.appendChild(div);
}

function openPopup(booth){
  currentBooth = booth;
  document.getElementById("booth").innerText = "小間：" + booth;
  document.getElementById("name").value = dataList[booth] || "";
  document.getElementById("popup").style.display = "block";
}

async function save(){
  const name = document.getElementById("name").value.trim();
  if(!currentBooth || !name) return alert("担当者名を入力してください");

  try{
    const res = await fetch(SHEET_URL, {
      method:"POST",
      body: JSON.stringify({booth:currentBooth, name})
    });
    const result = await res.json();
    if(result.status==="success"){
      dataList[currentBooth] = name;
      updateList();
      updateColor();
      document.getElementById("popup").style.display = "none";
    } else {
      alert("保存失敗："+result.message);
    }
  }catch(e){
    alert("保存エラー："+e);
  }
}

function updateList(){
  const table = document.getElementById("list");
  let html = "<tr><th>小間番号</th><th>担当者</th></tr>";
  for(const b in dataList){
    html += `<tr><td>${b}</td><td>${dataList[b]}</td></tr>`;
  }
  table.innerHTML = html;
}

function updateColor(){
  const points = document.querySelectorAll(".point");
  points.forEach(p=>{
    if(dataList[p.dataset.booth]){
      p.classList.add("filled");
    } else {
      p.classList.remove("filled");
    }
  });
}

// データ読み込み
async function loadData(){
  try{
    const res = await fetch(SHEET_URL);
    const arr = await res.json();
    arr.forEach(r=>{ dataList[r.booth] = r.name; });
    updateList();
    updateColor();
  }catch(e){ console.log("読み込み失敗", e); }
}

loadData();

</script>
</body>
</html>
