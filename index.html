<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>展示会管理 完全版（POST成功対応済）</title>

<style>
body { font-family: Arial; }

#popup {
  display:none;
  position:fixed;
  top:30%;
  left:40%;
  background:#fff;
  padding:20px;
  border:2px solid #333;
  z-index: 1000;
}

#map {
  position:relative;
  width:1000px;
}

.booth-point {
  position:absolute;
  width:20px;
  height:20px;
  background:transparent;
  border:none;
  cursor:pointer;
  transform:translate(-50%, -50%);
}
</style>
</head>

<body>

<h2>展示会フロア</h2>

<div id="map">
  <img src="floor.png" width="1000">
</div>

<div id="popup">
  <h3 id="booth"></h3>
  <p id="company"></p>
  <input id="name">
  <button onclick="save()">保存</button>
</div>

<h3>一覧</h3>
<table border="1" id="list"></table>

<script>
const API_URL = "https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec"; // ←ここにGAS公開URL

let current = "";
let sheetData = [];

const positions = {
  "722": {x:285, y:184},
  "721": {x:285, y:210},
  "720": {x:286, y:233},
  // ... 既存の座標をすべてコピー
};

// 透明クリック範囲生成
const map = document.getElementById("map");
for (const booth in positions) {
  const pos = positions[booth];
  const div = document.createElement("div");
  div.className = "booth-point";
  div.style.left = pos.x + "px";
  div.style.top = pos.y + "px";
  div.onclick = () => openPopup(booth);
  map.appendChild(div);
}

// データ読み込み
async function loadData(){
  try {
    const res = await fetch(API_URL);
    sheetData = await res.json();
    renderList();
  } catch(err) {
    alert("一覧取得に失敗しました");
    console.error(err);
  }
}

function openPopup(booth){
  current = booth;
  let company = "";
  let name = "";

  for(let i=1;i<sheetData.length;i++){
    if(sheetData[i][0]==booth){
      company = sheetData[i][1];
      name = sheetData[i][2]||"";
      break;
    }
  }

  document.getElementById("booth").innerText = "小間："+booth;
  document.getElementById("company").innerText = company;
  document.getElementById("name").value = name;

  document.getElementById("popup").style.display="block";
}

// 保存処理（POPUP閉じる＋一覧更新）
async function save(){
  const name = document.getElementById("name").value;

  try {
    await fetch(API_URL, {
      method:"POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({booth: current, name: name})
    });

    await loadData(); // 一覧更新
    document.getElementById("popup").style.display="none"; // POPUP閉じる

  } catch(err) {
    alert("保存に失敗しました");
    console.error(err);
  }
}

function renderList(){
  let html = "<tr><th>小間</th><th>出展社</th><th>担当</th></tr>";
  for(let i=1;i<sheetData.length;i++){
    html += `<tr>
      <td>${sheetData[i][0]}</td>
      <td>${sheetData[i][1]}</td>
      <td>${sheetData[i][2]||""}</td>
    </tr>`;
  }
  document.getElementById("list").innerHTML = html;
}

loadData();
</script>

</body>
</html>
