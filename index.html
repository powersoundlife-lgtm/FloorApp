<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>展示会フロア管理（共同編集版）</title>
<style>
body { font-family: Arial, sans-serif; }
#floor { position:relative; width:1000px; margin-bottom:20px; }
.point {
  position:absolute;
  cursor:pointer;
  background:transparent;
  border-radius:50%;
  transition: background 0.3s;
  pointer-events: auto; /* クリック可能に */
}
.point.filled { background:rgba(0,128,255,0.5); }
#popup {
  display:none;
  position:fixed;
  top:30%;
  left:40%;
  background:#fff;
  padding:20px;
  border:2px solid #333;
}
table { border-collapse: collapse; width: 50%; margin-top: 20px; }
table, th, td { border: 1px solid #333; padding: 5px; text-align: center; }
</style>
</head>
<body>

<h2>展示会フロア管理（共同編集版）</h2>

<div id="floor">
  <img src="floor.png" width="1000" id="floor-img">
</div>

<div id="popup">
  <h3 id="booth"></h3>
  <p id="company"></p>
  <input id="name" placeholder="担当者名">
  <button onclick="save()">保存</button>
</div>

<h3>登録済み一覧</h3>
<table id="list">
  <tr><th>小間番号</th><th>担当者</th></tr>
</table>

<script>
const SHEET_URL = "https://script.google.com/macros/s/AKfycbzEz4uObLgiDAX88LEhAjsgula85rkTo6gWAsLlff4QZtdrlffmC2zf8Mv26u7XmfXk/exec"; 
const positions = {
  "722": {x:285, y:184},
  "721": {x:285, y:210},
  "720": {x:286, y:233},
  "719": {x:288, y:257},
  "718": {x:287, y:279},
  "717": {x:285, y:301},
  "716": {x:292, y:360},
  "715": {x:283, y:382},
  "714": {x:290, y:407},
  "713": {x:290, y:428},
  "172": {x:290, y:450},
  "711": {x:289, y:473},
  "710": {x:291, y:487},
  "709": {x:288, y:532},
  "708": {x:328, y:556},
  "707": {x:350, y:557},
  "706": {x:372, y:554},
  "705": {x:389, y:552},
  "704": {x:413, y:553},
  "703": {x:434, y:555},
  "702": {x:454, y:555},
  "701": {x:474, y:552},
  "101": {x:580, y:556},
  "102": {x:599, y:551},
  "103": {x:620, y:554},
  "104": {x:645, y:555},
  "105": {x:668, y:555},
  "106": {x:689, y:554},
  "107": {x:707, y:496},
  "108": {x:711, y:470},
  "109": {x:707, y:451},
  "110": {x:707, y:431},
  "111": {x:707, y:410},
  "112": {x:709, y:391},
  "113": {x:707, y:365},
  "114": {x:707, y:319},
  "115": {x:703, y:296},
  "116": {x:704, y:280},
  "117": {x:709, y:252},
  "118": {x:707, y:234},
  "119": {x:705, y:212},
  "120": {x:704, y:192}
};

const floorDiv = document.getElementById("floor");
let currentBooth = "";
let dataList = {};

// クリック範囲生成
const size = 10;
for(const b in positions){
  const p = positions[b];
  const div = document.createElement("div");
  div.className = "point";
  div.style.width = size+"px";
  div.style.height = size+"px";
  div.style.left = (p.x - size/2) + "px";
  div.style.top = (p.y - size/2) + "px";
  div.dataset.booth = b;
  div.addEventListener("click",()=>openPopup(b)); // onclick→addEventListener
  floorDiv.appendChild(div);
}

// ポップアップ
function openPopup(booth){
  currentBooth = booth;
  document.getElementById("booth").innerText = "小間：" + booth;
  document.getElementById("name").value = dataList[booth] || "";
  document.getElementById("popup").style.display = "block";
}

// 保存
async function save(){
  const name = document.getElementById("name").value.trim();
  if(!currentBooth || !name) return alert("担当者名を入力してください");

  try{
    const res = await fetch(SHEET_URL, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({booth:currentBooth, name})
    });
    const result = await res.json();
    if(result.status==="success"){
      dataList[currentBooth] = name;
      updateList();
      updateColor();
      document.getElementById("popup").style.display = "none"; // ポップアップ閉じる
    } else {
      alert("保存失敗："+result.message);
    }
  }catch(e){
    alert("保存エラー："+e);
  }
}

// 一覧表示更新
function updateList(){
  const table = document.getElementById("list");
  let html = "<tr><th>小間番号</th><th>担当者</th></tr>";
  for(const b in dataList){
    html += `<tr><td>${b}</td><td>${dataList[b]}</td></tr>`;
  }
  table.innerHTML = html;
}

// 色付け更新
function updateColor(){
  const points = document.querySelectorAll(".point");
  points.forEach(p=>{
    if(dataList[p.dataset.booth]){
      p.classList.add("filled");
    } else {
      p.classList.remove("filled");
    }
  });
}

// データ読み込み
async function loadData(){
  try{
    const res = await fetch(https://script.google.com/macros/s/AKfycbyrUA3v7p969kyCq0n4mBNfNvzBTGwovEiSoWJqsScZHgShb6uqkxE6JR7xk0RLDdFxeg/exec);
    const arr = await res.json();
    arr.forEach(r=>{
      dataList[r.booth] = r.name;
    });
    updateList();
    updateColor();
  }catch(e){
    console.log("読み込み失敗", e);
  }
}

// 初期ロード
loadData();

</script>
</body>
</html>
