<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>フロア設定ツール</title>

<style>
#map { position:relative; width:1000px; }
.point {
  position:absolute;
  border:2px solid red;
}
</style>
</head>

<body>

<h2>① 小間をクリック → ②番号入力</h2>

<div id="map">
  <img src="floor.png" width="1000" onclick="addPoint(event)">
</div>

<button onclick="exportData()">座標を出力</button>

<pre id="output"></pre>

<script>

let positions = [];

function addPoint(e){
  const rect = e.target.getBoundingClientRect();

  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const booth = prompt("小間番号を入力");

  if(!booth) return;

  positions.push({booth,x,y});

  const div = document.createElement("div");
  div.className = "point";
  div.style.left = x+"px";
  div.style.top = y+"px";
  div.style.width = "80px";
  div.style.height = "80px";

  document.getElementById("map").appendChild(div);
}

function exportData(){
  let text = "const positions = {\n";

  positions.forEach(p=>{
    text += `"${p.booth}": {x:${Math.round(p.x)}, y:${Math.round(p.y)}},\n`;
  });

  text += "}";

  document.getElementById("output").innerText = text;
}

</script>

</body>
</html>
